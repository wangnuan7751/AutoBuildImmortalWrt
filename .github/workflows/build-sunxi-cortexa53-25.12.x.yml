name: build-sunxi-cortexa53-25.12.x

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: "请选择开发板型号（可多选，用英文逗号,分隔）"
        required: true
        options:
          - xunlong_orangepi-zero3
          - friendlyarm_nanopi-r1s-h5
          - xunlong_orangepi-zero2
          - xunlong_orangepi-zero-plus
          - friendlyarm_nanopi-neo2
          - xunlong_orangepi-pc2
          - friendlyarm_nanopi-neo-plus2
          - libretech_all-h3-cc-h5
          - pine64_pine64-plus
          - pine64_sopine-baseboard
        default: xunlong_orangepi-zero3

      luci_version:
        description: "选择 ImmortalWrt 版本"
        required: false
        default: "25.12.0-rc1"
        type: choice
        options:
          - 25.12.0-rc1
          - 25.12.0-rc2

      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'

      size:
        description: "固件分区大小 (MB)"
        required: true
        default: '1024'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set executable permissions
        run: chmod +x "${{ github.workspace }}/sunxi-cortexa53/build25.sh"

      - name: Build ImmortalWrt for sunxi-cortexa53
        run: |
          PROFILES="${{ github.event.inputs.profile }}"
          INCLUDE_DOCKER="${{ github.event.inputs.include_docker }}"
          ROOTSIZE="${{ github.event.inputs.size }}"
          LUCI_VERSION="${{ github.event.inputs.luci_version }}"

          # 支持多选：按逗号分割
          IFS=',' read -r -a PROFILE_ARRAY <<< "$PROFILES"

          for PROFILE in "${PROFILE_ARRAY[@]}"; do
            PROFILE=$(echo "$PROFILE" | xargs)  # 去空格
            echo -e "\n========================================"
            echo "  正在编译设备：$PROFILE"
            echo -e "========================================\n"

            docker run --rm -i \
              --user root \
              -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
              -v "${{ github.workspace }}/files/etc/uci-defaults:/home/build/immortalwrt/files/etc/uci-defaults" \
              -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
              -v "${{ github.workspace }}/sunxi-cortexa53/build25.sh:/home/build/immortalwrt/build.sh" \
              -e PROFILE="$PROFILE" \
              -e INCLUDE_DOCKER="$INCLUDE_DOCKER" \
              -e ROOTSIZE="$ROOTSIZE" \
              immortalwrt/imagebuilder:sunxi-cortexa53-openwrt-${LUCI_VERSION} \
              /bin/bash /home/build/immortalwrt/build.sh

            # 任意一个编译失败直接终止整个任务
            if [ $? -ne 0 ]; then
              echo "错误：$PROFILE 编译失败！"
              exit 1
            fi
          done

      - name: Generate release info.md
        run: |
          INFO_FILE="${{ github.workspace }}/sunxi-cortexa53/info.md"
          cat > "$INFO_FILE" << EOF
          ## 自动编译 ImmortalWrt 25.12.x
          - 平台：sunxi-cortexa53
          - 版本：${{ github.event.inputs.luci_version }}
          - 设备：${{ github.event.inputs.profile }}
          - 固件大小：${{ github.event.inputs.size }}MB
          EOF

          if [ "${{ github.event.inputs.include_docker }}" == "yes" ]; then
            echo "- 已集成：Docker" >> "$INFO_FILE"
          else
            echo "- 未集成：Docker" >> "$INFO_FILE"
          fi

          echo "=== 生成的 info.md ==="
          cat "$INFO_FILE"

      - name: Upload firmware to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Autobuild-sunxi-cortexa53
          name: ImmortalWrt-sunxi-cortexa53-auto-build
          body_path: ${{ github.workspace }}/sunxi-cortexa53/info.md
          files: |
            ${{ github.workspace }}/bin/targets/sunxi/cortexa53/*squashfs-sdcard.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
